<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="360" viewBox="0 0 800 360" fill="none">
  <style>
    /* Default / Light Theme */
    :root {
      --bg-color: #ffffff;
      --border-color: #e1e4e8;
      --text-main: #24292e;
      --text-accent: #0366d6;
      --text-muted: #586069;
      --terminal-header: #f6f8fa;
    }

    /* Dark Theme Toggle */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0d1117;
        --border-color: #30363d;
        --text-main: #c9d1d9;
        --text-accent: #58a6ff;
        --text-muted: #8b949e;
        --terminal-header: #161b22;
      }
      .ascii-light { display: none !important; }
      .ascii-dark { display: block !important; }
    }

    @media (prefers-color-scheme: light) {
      .ascii-light { display: block !important; }
      .ascii-dark { display: none !important; }
    }

    .card {
      fill: var(--bg-color);
      stroke: var(--border-color);
      stroke-width: 1.5;

    }

    .terminal-header {
      fill: var(--terminal-header);
      stroke: var(--border-color);
      stroke-width: 1.5;
    }

    .font-mono {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 13px;
    }

    .title {
      font-weight: bold;
      fill: var(--text-accent);
    }

    .label {
      font-weight: bold;
      fill: var(--text-accent);
    }

    .value {
      fill: var(--text-main);
    }

    .divider {
      stroke: var(--border-color);
      stroke-width: 1;
    }
  </style>

  <!-- Background Card -->
  <rect class="card" x="1" y="1" width="798" height="358" />

  <!-- Terminal Style Header -->
  <!--<path class="terminal-header" d="M 1,9 Q 1,1 9,1 L 791,1 Q 799,1 799,9 L 799,35 L 1,35 Z" />-->
  
  <!-- Window Controls (Mac/Linux Terminal vibe) -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56" />
  <circle cx="40" cy="18" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="18" r="6" fill="#27c93f" />
  
  <!-- Terminal Title -->
  <text x="400" y="22" text-anchor="middle" class="font-mono" fill="var(--text-muted)" font-size="12">fastfetch — profile</text>

  <!-- Left Column (40%): ASCII Art / Custom Drawing -->
  <g transform="translate(30, 60)">

    <image href="./ascii_content_drawning.png" class="ascii-dark" x="0" y="10" width="280" height="260" />
    <image href="./ascii_content_drawning_inverted.png" class="ascii-light" x="0" y="10" width="280" height="260" />


  </g>

  <!-- Vertical Divider -->
  <line x1="340" y1="55" x2="340" y2="335" class="divider" />

  <!-- Right Column (60%): Fastfetch Specs -->
  <g transform="translate(370, 75)" class="font-mono">
    <!-- Header -->
    <text x="0" y="0" class="title" font-size="15">Eddie-Exabit@github-profile</text>
    <line x1="0" y1="10" x2="390" y2="10" class="divider" />

    <!-- Specs List -->
    <g transform="translate(0, 32)">
      <text x="0" y="0"><tspan class="label">OS</tspan>: <tspan class="value">Linux (Developer Edition)</tspan></text>
      <text x="0" y="18"><tspan class="label">Host</tspan>: <tspan class="value">Portfolio-PC v2.0</tspan></text>
      <text x="0" y="36"><tspan class="label">Kernel</tspan>: <tspan class="value">Git Commit 2.45.0</tspan></text>
      <text x="0" y="54"><tspan class="label">Uptime</tspan>: <tspan class="value">5 years (Since joining GitHub)</tspan></text>
      <text x="0" y="72"><tspan class="label">Shell</tspan>: <tspan class="value">zsh 5.9 (konsole)</tspan></text>
      <text x="0" y="90"><tspan class="label">DE</tspan>: <tspan class="value">KDE Plasma 6</tspan></text>
      <text x="0" y="108"><tspan class="label">WM</tspan>: <tspan class="value">KWin (Wayland)</tspan></text>
      <text x="0" y="126"><tspan class="label">Terminal</tspan>: <tspan class="value">Konsole</tspan></text>
      <text x="0" y="144"><tspan class="label">IDE</tspan>: <tspan class="value">Visual Studio</tspan></text>
      <text x="0" y="162"><tspan class="label">CPU</tspan>: <tspan class="value">Brain Core (8) @ 4.20GHz</tspan></text>
      <text x="0" y="180"><tspan class="label">GPU</tspan>: <tspan class="value">RTX-Creative (Imagination)</tspan></text>
      <text x="0" y="198"><tspan class="label">Memory</tspan>: <tspan class="value">Coffee / Tea (Highly Cached)</tspan></text>
      
      <!-- Color Blocks -->
      <text x="0" y="230" font-size="15">🟥 🟧 🟨 🟩 🟦 🟪 ⬛ ⬜</text>
    </g>
  </g>
</svg>
