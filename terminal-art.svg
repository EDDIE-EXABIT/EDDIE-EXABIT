<svg xmlns="http://www.w3.org/2000/svg" fill="none" width="100%" height="320">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        /* Base Styling */
        .container {
          display: flex;
          flex-direction: row;
          justify-content: space-around;
          align-items: center;
          font-family: monospace;
          color: #c9d1d9;
          background: #0d1117;
          border-radius: 6px;
          padding: 20px;
          box-sizing: border-box;
          height: 100%;
        }
        .art-col {
          width: 40%;
          text-align: center;
        }
        .art-col img {
          max-width: 100%;
          height: auto;
          border-radius: 4px;
        }
        .specs-col {
          width: 55%;
        }
        pre {
          margin: 0;
          font-size: 13px;
          line-height: 1.4;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 600px) {
          .container {
            flex-direction: column;
            height: auto;
            text-align: center;
          }
          .art-col, .specs-col {
            width: 100%;
          }
          .art-col {
            margin-bottom: 15px;
          }
          .art-col img {
            max-width: 150px; /* Constrains it on small mobile screens */
          }
        }
      </style>

      <div class="container">
        <!-- Left Side: Image -->
        <div class="art-col">
          <!-- Note: The image must be hosted via a secure URL (https) -->
          <img src="https://i.postimg.cc/8CNH0gVv/asci-content2.png" alt="Terminal Art" />
        </div>


        <div class="specs-col">
<pre>
<b>Eddie-Exabit@github-profile</b>
---------------------------
<b>OS</b>: Linux (Developer Edition)
<b>Host</b>: Portfolio-PC v2.0
<b>Kernel</b>: Git Commit 2.45.0
<b>Uptime</b>: 3 years (Since joining GitHub)
<b>Shell</b>: zsh 5.9 (konsole)
<b>DE</b>: KDE Plasma 6
<b>WM</b>: KWin (Wayland)
<b>Terminal</b>: Konsole
<b>IDE</b>: VS Code / Neovim
<b>CPU</b>: Brain Core (8) @ 4.20GHz
<b>GPU</b>: RTX-Creative (Imagination)
<b>Memory</b>: Coffee / Tea (Highly Cached)

🟥 🟧 🟨 🟩 🟦 🟪 ⬛ ⬜
</pre>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
